<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alpine Connexion</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="cashback-info-modal" class="cashback-info-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="cashback-modal-title">
    <div class="cashback-info-card" onclick="event.stopPropagation()">
        <button type="button" class="cashback-info-close" id="cashback-modal-close" aria-label="Close">✕</button>
        <h2 id="cashback-modal-title"></h2>
        <p id="cashback-modal-body" class="cashback-modal-body"></p>
        <button type="button" class="age-gate-btn age-gate-btn-primary cashback-info-ok" id="cashback-modal-ok"></button>
    </div>
</div>

<div id="age-gate" class="age-gate hidden" role="dialog" aria-modal="true" aria-labelledby="age-gate-title">
    <div class="age-gate-card">
        <h2 id="age-gate-title"></h2>
        <p id="age-gate-text"></p>
        <div class="age-gate-actions">
            <button id="age-gate-accept" type="button" class="age-gate-btn age-gate-btn-primary"></button>
            <button id="age-gate-decline" type="button" class="age-gate-btn age-gate-btn-secondary"></button>
        </div>
    </div>
</div>

<div id="catalog-access-error" class="catalog-access-error hidden" role="alert" aria-live="assertive">
    <p id="catalog-access-error-msg"></p>
</div>

<!-- #region Toast -->
<div class="toast" id="toast" aria-live="polite" aria-atomic="true"></div>
<!-- #endregion -->

<!-- #region App -->
<div id="app">
    <!-- #region Header / Banner — Logo centré style hero (comme ref ) -->
    <header class="banner">
        <div class="banner-inner">
            <img
                class="banner-logo-img"
                src="https://res.cloudinary.com/divcybeds/image/upload/v1771239856/Alpine_Connection_Wonka_LETTERING-V01_Logo_2022_o7rhyc.png"
                alt="Alpine Connexion"
            >
        </div>
    </header>
    <!-- #endregion -->

    <!-- #region Vue Catalogue -->
    <div class="view-panel" id="view-catalog">
        <nav class="filter-bar" aria-label="Filtres">
            <div class="filter-bar-left">
                <select class="lang-select" id="lang-switch" onchange="setLang(this.value)">
                    <option value="fr">FR</option>
                    <option value="en">EN</option>
                    <option value="de">DE</option>
                </select>
                <button type="button" class="points-badge" id="btn-cashback-info" aria-haspopup="dialog">
                    <span id="cashback-chip-label">Cashback</span>
                    <span id="cashback-chip-balance">—</span>
                </button>
            </div>
            <select class="filter-select" id="filter-category">
                <option value="" id="filter-all-option">📂 Toutes les catégories</option>
            </select>
        </nav>
        <main class="products-wrap">
            <div class="products-grid" id="products-grid"></div>
        </main>
        <section class="reviews-section" aria-labelledby="reviews-title">
            <div class="reviews-shell">
                <div class="reviews-header">
                    <h2 id="reviews-title">Customer Reviews</h2>
                    <p class="reviews-subtitle">Trusted feedback from verified buyers</p>
                </div>
                <div class="reviews-summary" id="reviews-summary"></div>
                <div class="reviews-toolbar">
                    <label class="reviews-control">
                        <span>Filter</span>
                        <select id="review-filter" aria-label="Filter reviews by rating">
                            <option value="all">All ratings</option>
                            <option value="5">5★ only</option>
                            <option value="4">4★ only</option>
                            <option value="3">3★ only</option>
                            <option value="2">2★ only</option>
                            <option value="1">1★ only</option>
                        </select>
                    </label>
                    <label class="reviews-control">
                        <span>Sort</span>
                        <select id="review-sort" aria-label="Sort reviews">
                            <option value="recent">Most recent</option>
                            <option value="high">Highest rating</option>
                            <option value="low">Lowest rating</option>
                        </select>
                    </label>
                    <div class="reviews-control reviews-control-action">
                        <span>Share</span>
                        <button id="reviews-add-btn" class="reviews-add-btn" type="button">Write a review</button>
                    </div>
                </div>
                <div id="reviews-list" class="reviews-list"></div>
                <div class="reviews-footer">
                    <button id="reviews-load-more" class="reviews-load-more" type="button">Load more reviews</button>
                </div>
            </div>
        </section>
    </div>
    <!-- #endregion -->

    <!-- #region Bottom navigation -->
    <nav class="bottom-nav" aria-label="Navigation principale">
        <button type="button" class="bottom-nav-item active" id="nav-catalog" onclick="showView('catalog')" aria-current="page">
            <span class="bottom-nav-icon">🛒</span>
            <span class="bottom-nav-label" id="nav-catalog-label">Catalogue</span>
        </button>
    </nav>
    <!-- #endregion -->
</div>
<!-- #endregion -->

<div id="review-modal" class="review-modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="review-modal-title">
    <div class="review-modal-card" onclick="event.stopPropagation()">
        <button id="review-modal-close" class="review-modal-close" type="button" aria-label="Close">✕</button>
        <h3 id="review-modal-title">Write a review</h3>
        <form id="review-form" class="review-form">
            <div id="review-order-ref-hint" class="review-order-ref-hint">Checking order reference...</div>
            <label>
                Name
                <input id="review-name" type="text" maxlength="60" required>
            </label>
            <label>
                Rating
                <select id="review-rating" required>
                    <option value="5">5★</option>
                    <option value="4">4★</option>
                    <option value="3">3★</option>
                    <option value="2">2★</option>
                    <option value="1">1★</option>
                </select>
            </label>
            <label>
                Title
                <input id="review-title-input" type="text" maxlength="90" required>
            </label>
            <label>
                Review
                <textarea id="review-text" rows="4" maxlength="700" required></textarea>
            </label>
            <button class="reviews-add-btn" type="submit">Submit review</button>
        </form>
    </div>
</div>

<!-- #region Product Modal -->
<div class="modal-overlay" id="product-modal" onclick="closeProductModal(event)">
    <div class="modal-sheet" onclick="event.stopPropagation()">
        <div class="modal-handle"></div>
        <button class="modal-close" onclick="closeProductModal()">✕</button>
        <div id="modal-content"></div>
    </div>
</div>
<!-- #endregion -->

<!-- #region Cart Modal -->
<div class="cart-overlay" id="cart-overlay" onclick="closeCart(event)">
    <div class="cart-panel" onclick="event.stopPropagation()">
        <div class="cart-panel-header">
            <h2 class="cart-panel-title" id="cart-title">🛒 Panier</h2>
            <button class="modal-close" onclick="closeCart()" style="position:static;">✕</button>
        </div>
        <div id="cart-items"></div>
    </div>
</div>
<!-- #endregion -->

<!-- #region Cart Button (FAB) -->
<button class="cart-fab" id="cart-fab" onclick="openCart()">
    🛒
    <span class="cart-fab-badge" id="cart-badge">0</span>
</button>
<!-- #endregion -->

<!-- #region Scripts -->
<script src="app.js?v=20260326-reviews-order-reference"></script>
<!-- #endregion -->
</body>
</html>
